<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Memory Game</title>
		<style>
		:root {
			--primary-color: #3498db;
			--bg-color: #2c3e50;
			--card-bg: #ecf0f1;
		}

		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background-color: var(--bg-color);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			color: white;
		}

		h1 { margin-bottom: 10px; }

		.stats {
			margin-bottom: 20px;
			font-size: 1.2rem;
			display: flex;
			gap: 20px;
		}

		.game-container {
			display: grid;
			grid-template-columns: repeat(4, 80px);
			grid-gap: 10px;
		}

		.card {
			width: 80px;
			height: 80px;
			cursor: pointer;
			position: relative;
			transform-style: preserve-3d; 
			transition: transform 0.5s;
		}

		.card.flipped {
			transform: rotateY(180deg);
		}

		.card-face {
			position: absolute;
			width: 100%;
			height: 100%;
			backface-visibility: hidden;
			border-radius: 8px;
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 2rem;
			box-shadow: 0 4px 6px rgba(0,0,0,0.3);
			transform: translateZ(0); 
		}

		.card-back {
			background-color: var(--primary-color);
			color: white;
		}

		.card-front {
			background-color: var(--card-bg);
			transform: rotateY(180deg); 
		}

		.card.matched {
			animation: pulse 0.5s;
		}

		.card.matched .card-front {
			background-color: #2ecc71;
		}

		@keyframes pulse {
			0% { transform: rotateY(180deg) scale(1); }
			50% { transform: rotateY(180deg) scale(1.1); }
			100% { transform: rotateY(180deg) scale(1); }
		}

		button {
			margin-top: 20px;
			padding: 10px 20px;
			font-size: 1rem;
			background-color: #e74c3c;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			transition: background 0.3s;
		}

		button:hover { background-color: #c0392b; }
		</style>

	</head>
	<body>

		<h1>🎈 Memory</h1>
		<div class="stats">
			<span>Chrono: <span id="timer">0</span>s</span>
			<span>Coups: <span id="moves">0</span></span>
		</div>

		<div class="game-container" id="game-board">
		</div>

		<button onclick="initGame()">Rejouer</button>

		<script>
		const emojis = ['🍕', '🚀', '🎸', '🦁', '🎈', '🌟', '🎲', '👻'];
		let cards = [...emojis, ...emojis];
		let flippedCards = [];
		let matchedPairs = 0;
		let moves = 0;
		let timer = 0;
		let timerInterval;
		let canFlip = true;

		const gameBoard = document.getElementById('game-board');
		const movesDisplay = document.getElementById('moves');
		const timerDisplay = document.getElementById('timer');

		function shuffle(array) {
			for (let i = array.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[array[i], array[j]] = [array[j], array[i]];
			}
			return array;
		}

		function initGame() {
			gameBoard.innerHTML = '';
			matchedPairs = 0;
			moves = 0;
			timer = 0;
			flippedCards = [];
			canFlip = true;
			clearInterval(timerInterval);
			movesDisplay.textContent = '0';
			timerDisplay.textContent = '0';

			const shuffledCards = shuffle(cards);

			shuffledCards.forEach((emoji, index) => {
				const cardElement = document.createElement('div');
				cardElement.classList.add('card');
				cardElement.dataset.index = index;
				cardElement.dataset.emoji = emoji;

				cardElement.innerHTML = `
				<div class="card-face card-back">❓</div>
				<div class="card-face card-front">${emoji}</div>`;

				cardElement.addEventListener('click', () => flipCard(cardElement));
				gameBoard.appendChild(cardElement);
			});
		}

		function flipCard(card) {
			if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) {
				return;
			}

			card.classList.add('flipped');
			flippedCards.push(card);

			if (moves === 0 && flippedCards.length === 1) {
				timerInterval = setInterval(() => {
					timer++;
					timerDisplay.textContent = timer;
				}, 1000);
			}

			if (flippedCards.length === 2) {
				moves++;
				movesDisplay.textContent = moves;
				checkMatch();
			}
		}

		function checkMatch() {
			canFlip = false;
			const [card1, card2] = flippedCards;

			if (card1.dataset.emoji === card2.dataset.emoji) {
				card1.classList.add('matched');
				card2.classList.add('matched');
				matchedPairs++;
				flippedCards = [];
				canFlip = true;

				if (matchedPairs === emojis.length) {
					clearInterval(timerInterval);
					setTimeout(() => alert(`🎉 Bravo ! Terminé en ${timer}s et ${moves} coups.`), 300);
				}
			} else {
				setTimeout(() => {
					card1.classList.remove('flipped');
					card2.classList.remove('flipped');
					flippedCards = [];
					canFlip = true;
				}, 1000);
			}
		}

		initGame();
		</script>
	</body>
</html>
