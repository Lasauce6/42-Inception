services:
  mariadb:
    container_name: mariadb
    image: mariadb:42
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      inception:
        ipv4_address: '172.18.0.2'
    restart: unless-stopped
    expose:
      - "3306"
    secrets:
      - db_password
      - db_root_password

  wordpress:
    container_name: wordpress
    image: wordpress:42
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      inception:
        ipv4_address: '172.18.0.3'
    depends_on:
      - mariadb
    restart: unless-stopped
    expose:
      - "9000"
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password

  nginx:
    container_name: nginx
    image: nginx:42
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      inception:
        ipv4_address: '172.18.0.4'
    depends_on:
      - wordpress
    ports:
      - "443:443"
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:42
    build:
      context: requirements/bonus/redis
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      inception:
        ipv4_address: '172.18.0.5'
    restart: unless-stopped
    depends_on:
      - wordpress
    expose :
      - "6379"

  ftp:
    container_name: ftp
    image: ftp:42
    build:
      context: requirements/bonus/ftp
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      inception:
        ipv4_address: '172.18.0.6'
    ports:
      - "20:20"
      - "21:21"
      - "40000-40005:40000-40005"
    restart: unless-stopped
    depends_on:
      - wordpress
    secrets:
      - ftp_password

  website:
    container_name: website
    image: website:42
    build:
      context: requirements/bonus/website
      dockerfile: Dockerfile
    networks:
      inception:
        ipv4_address: '172.18.0.7'
    ports:
      - "8080:8080"
    restart: unless-stopped

  adminer:
    container_name: adminer
    image: adminer:42
    build:
      context: requirements/bonus/adminer
      dockerfile: Dockerfile
    networks:
      inception:
        ipv4_address: '172.18.0.8'
    ports:
      - "8000:80"
    restart: unless-stopped
    depends_on:
      - mariadb

  uptime-kuma:
    container_name: uptime-kuma
    image: uptime-kuma:42
    build:
      context: requirements/bonus/uptime-kuma
      dockerfile: Dockerfile
    networks:
      inception:
        ipv4_address: '172.18.0.9'
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      - wordpress
      - website
      - adminer

volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/wordpress

  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mariadb

networks:
  inception:
    driver: bridge
    ipam:
      config:
        - subnet: '172.18.0.0/24'

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
